<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>PL Tracker</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PL Tracker">
  <meta name="theme-color" content="#0A0A0C">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="manifest" href="/manifest.json">
  <style>
    :root {
      --bg-1: #0A0A0C;
      --bg-2: #131316;
      --bg-3: #1C1C21;
      --border-1: #25252B;
      --border-2: #3A3A42;
      --accent: #D4382F;
      --accent-dim: #A02C26;
      --accent-glow: rgba(212, 56, 47, 0.15);
      --text-1: #F2EBDC;
      --text-2: #8B8680;
      --text-3: #5A5550;
      --success: #6FA85B;
      --warning: #E8A33D;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg-1); color: var(--text-1);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      overscroll-behavior: none;
    }
    body { padding-top: env(safe-area-inset-top); }
    input { -webkit-appearance: none; appearance: none; font-family: inherit; }
    input:focus { outline: 1px solid var(--accent); outline-offset: -1px; }
    button { cursor: pointer; font-family: inherit; transition: transform 80ms ease-out, background 120ms; }
    button:active { transform: scale(0.97); }

    .app { min-height: 100vh; background: var(--bg-1); padding-bottom: calc(72px + env(safe-area-inset-bottom)); max-width: 600px; margin: 0 auto; }
    .pad { padding: 28px 20px 20px; }

    /* === ANIMATIONS === */
    .anim-fade { animation: animFade 200ms ease-out; }
    .anim-slide-up { animation: animSlideUp 300ms cubic-bezier(0.2, 0.8, 0.2, 1); }
    .anim-slide-down { animation: animSlideDown 250ms cubic-bezier(0.2, 0.8, 0.2, 1); }
    @keyframes animFade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes animSlideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes animSlideDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseCheck {
      0% { transform: scale(1); }
      40% { transform: scale(1.18); }
      100% { transform: scale(1); }
    }
    .set-check.just-checked { animation: pulseCheck 280ms ease-out; }

    /* === TYPO === */
    .eyebrow { font-size: 10px; letter-spacing: 2px; color: var(--text-2); font-weight: 600; }
    h1 {
      font-size: 36px; font-weight: 800; letter-spacing: -1px;
      margin: 4px 0 0 0; line-height: 1; color: var(--text-1);
      font-family: Impact, 'Helvetica Neue Condensed', 'Arial Narrow', sans-serif;
      text-transform: uppercase;
    }
    .subtitle { font-size: 14px; color: var(--text-2); margin-top: 6px; letter-spacing: 0.3px; }
    .section-label { font-size: 10px; letter-spacing: 2px; color: var(--text-2); font-weight: 700; }

    /* === COUNTDOWN === */
    .countdown {
      background: var(--bg-2);
      border-left: 3px solid var(--accent);
      padding: 18px 16px;
      margin-top: 18px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .countdown-left { display: flex; flex-direction: column; gap: 4px; }
    .countdown-label { font-size: 10px; letter-spacing: 1.5px; color: var(--text-2); font-weight: 600; }
    .countdown-target {
      font-size: 14px; font-weight: 700; color: var(--text-1);
      font-family: Impact, 'Helvetica Neue Condensed', sans-serif;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .countdown-date { font-size: 11px; color: var(--text-2); }
    .countdown-num {
      font-size: 44px; font-weight: 800; color: var(--accent);
      font-family: Impact, 'Helvetica Neue Condensed', sans-serif;
      line-height: 0.85; letter-spacing: -1.5px;
    }
    .countdown-num-sub { font-size: 10px; color: var(--text-2); text-align: right; letter-spacing: 1.5px; font-weight: 600; }

    /* === RECOVERY STATUS === */
    .recovery {
      margin-top: 16px;
      background: var(--bg-2);
      padding: 12px 16px;
    }
    .recovery-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .recovery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .recovery-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .recovery-lift {
      font-size: 10px; letter-spacing: 1px; color: var(--text-2); font-weight: 700;
    }
    .recovery-time {
      font-size: 18px; font-weight: 800; font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      letter-spacing: -0.5px;
    }
    .recovery-time.fresh { color: var(--text-3); }
    .recovery-time.warning { color: var(--warning); }
    .recovery-time.ready { color: var(--success); }
    .recovery-time.never { color: var(--text-3); }

    /* === BW + READINESS === */
    .quick-row { display: grid; grid-template-columns: 1fr 1.4fr; gap: 10px; margin-top: 16px; }
    .quick-card { background: var(--bg-2); padding: 12px; }
    .quick-card .eyebrow { display: block; margin-bottom: 8px; }
    .bw-display {
      font-size: 24px; font-weight: 800; color: var(--text-1);
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      letter-spacing: -0.5px; line-height: 1; cursor: pointer;
    }
    .bw-display.empty { color: var(--text-3); }
    .bw-unit { font-size: 12px; color: var(--text-2); margin-left: 3px; font-family: -apple-system, sans-serif; font-weight: 600; }
    .readiness-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .readiness-btn {
      background: transparent; border: 1px solid var(--border-1);
      padding: 6px 0; font-size: 18px; line-height: 1;
      transition: all 120ms;
    }
    .readiness-btn.selected { background: var(--accent-glow); border-color: var(--accent); }
    .readiness-btn:active { background: var(--bg-3); }

    /* === SESSION SECTION (today) === */
    .session-section { margin-top: 24px; margin-bottom: 24px; }
    .session-section-label { margin-bottom: 8px; }
    .session-day-name {
      font-size: 22px; font-weight: 800; color: var(--text-1);
      font-family: Impact, 'Helvetica Neue Condensed', sans-serif;
      text-transform: uppercase; letter-spacing: -0.5px; line-height: 1.1;
    }
    .session-week-info { font-size: 11px; color: var(--text-2); letter-spacing: 1px; margin-top: 6px; margin-bottom: 16px; font-weight: 600; }
    .ex-list { margin-bottom: 20px; }
    .ex-list-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 10px 0; border-bottom: 1px solid var(--border-1); gap: 12px;
    }
    .ex-list-row:last-child { border-bottom: none; }
    .ex-list-name { font-size: 13px; color: var(--text-1); flex: 1; }
    .ex-mark { color: var(--border-2); margin-right: 6px; font-size: 9px; }
    .ex-mark.main { color: var(--accent); }
    .ex-list-stats {
      font-size: 12px; color: var(--accent); font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      white-space: nowrap; font-weight: 600;
    }

    .cta {
      width: 100%; padding: 18px; background: var(--accent); color: var(--text-1);
      border: none; font-weight: 800; font-size: 14px; letter-spacing: 2px;
    }
    .cta:active { background: var(--accent-dim); }

    /* === LAST SESSION === */
    .last-session {
      background: var(--bg-2); padding: 14px 16px; margin-top: 24px;
    }
    .last-session-info { font-size: 14px; color: var(--text-1); font-weight: 600; margin-top: 6px; }
    .last-session-detail {
      font-size: 12px; color: var(--accent); margin-top: 4px;
      font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-weight: 600;
    }
    .last-session-empty { color: var(--text-3); font-size: 12px; font-style: italic; margin-top: 4px; }

    /* === PROGRESS BAR === */
    .progress-block { margin-top: 32px; }
    .progress-lbl { display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 1.5px; color: var(--text-2); margin-bottom: 8px; font-weight: 600; }
    .progress-bar { height: 3px; background: var(--border-1); overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }

    /* === PROGRAMME VIEW === */
    .week-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 24px; margin-bottom: 20px; }
    .week-tab {
      padding: 10px 0; background: transparent; color: var(--text-2); border: 1px solid var(--border-1);
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    }
    .week-tab.active { background: var(--accent); color: var(--text-1); border-color: var(--accent); }
    .block-badge { display: inline-block; padding: 4px 8px; background: var(--bg-2); color: var(--text-2); font-size: 10px; letter-spacing: 1.5px; font-weight: 600; margin-bottom: 12px; }

    .day-row {
      width: 100%; background: var(--bg-2); border: none; border-left: 3px solid var(--border-1);
      padding: 16px; margin-bottom: 8px; color: var(--text-1); text-align: left;
      display: flex; justify-content: space-between; align-items: center;
    }
    .day-row.done { border-left-color: var(--success); }
    .day-row.test { border-left-color: var(--accent); }
    .day-label { font-size: 10px; letter-spacing: 1.5px; color: var(--text-2); font-weight: 600; margin-bottom: 4px; }
    .day-name { font-size: 16px; font-weight: 600; color: var(--text-1); }
    .day-date { font-size: 11px; color: var(--text-2); margin-top: 4px; font-family: ui-monospace, monospace; }
    .day-arrow { color: var(--text-2); font-size: 18px; }
    .day-arrow.done { color: var(--success); }

    /* === SESSION VIEW === */
    .back-btn { background: transparent; color: var(--text-2); border: none; padding: 0; font-size: 12px; letter-spacing: 1px; margin-bottom: 16px; }
    .session-progress { display: flex; align-items: center; gap: 12px; margin-top: 12px; margin-bottom: 24px; font-size: 11px; color: var(--text-2); letter-spacing: 1px; }
    .mini-bar { flex: 1; height: 2px; background: var(--border-1); }
    .mini-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s; }

    .ex-card { background: var(--bg-2); padding: 16px; margin-bottom: 16px; }
    .ex-name { font-size: 15px; font-weight: 600; color: var(--text-1); margin-bottom: 4px; }
    .ex-target { font-size: 12px; color: var(--accent); font-family: ui-monospace, 'SF Mono', Menlo, monospace; }
    .ex-note { font-size: 11px; color: var(--text-2); margin-top: 4px; font-style: italic; }
    .ex-test-banner {
      background: var(--accent-glow); border: 1px solid var(--accent);
      padding: 8px 10px; margin-top: 8px; font-size: 11px; color: var(--text-1);
      letter-spacing: 0.5px; font-weight: 600;
    }

    .sets-grid { display: grid; grid-template-columns: 24px 1fr 1fr 1fr 40px; gap: 8px; align-items: center; margin-top: 12px; }
    .sets-grid.with-label { grid-template-columns: 24px 80px 1fr 1fr 40px; }
    .set-head { font-size: 9px; letter-spacing: 1px; color: var(--text-2); font-weight: 600; text-transform: uppercase; padding-bottom: 4px; border-bottom: 1px solid var(--border-1); }
    .set-num { font-size: 13px; color: var(--text-2); font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-weight: 600; }
    .set-input { background: var(--bg-1); border: 1px solid var(--border-1); color: var(--text-1); padding: 8px 6px; font-size: 14px; font-family: ui-monospace, 'SF Mono', Menlo, monospace; text-align: center; width: 100%; }
    .set-label {
      font-size: 10px; color: var(--text-2); letter-spacing: 0.5px; line-height: 1.2;
      padding-right: 4px;
    }
    .set-label.attempt { color: var(--accent); font-weight: 700; }
    .set-check {
      width: 36px; height: 36px; border: 1px solid var(--border-1); background: transparent;
      font-size: 18px; font-weight: 700; color: var(--text-2);
      display: flex; align-items: center; justify-content: center; padding: 0;
    }
    .set-check.done { background: var(--success); color: var(--bg-1); border-color: var(--success); }

    /* === TIMER === */
    .timer {
      position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); left: 20px; right: 20px;
      max-width: 560px; margin: 0 auto; background: var(--bg-2); border: 1px solid var(--accent);
      padding: 16px; display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6); z-index: 20;
    }
    .timer-lbl { font-size: 10px; letter-spacing: 1.5px; color: var(--text-2); font-weight: 600; flex: 1; }
    .timer-num { font-size: 32px; font-weight: 800; color: var(--accent); font-family: ui-monospace, 'SF Mono', Menlo, monospace; letter-spacing: -1px; margin: 0 16px; }
    .timer-skip { background: transparent; color: var(--text-2); border: 1px solid var(--border-1); padding: 8px 12px; font-size: 10px; letter-spacing: 1px; }

    /* === NAV === */
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-1);
      border-top: 1px solid var(--border-1); display: flex; height: calc(64px + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom); z-index: 10;
    }
    .tab-btn { flex: 1; background: transparent; border: none; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px; font-weight: 600; color: var(--text-2); }
    .tab-btn.active { color: var(--accent); }
    .tab-icon { font-size: 18px; line-height: 1; }
    .tab-label { font-size: 10px; margin-top: 4px; letter-spacing: 0.5px; }

    /* === STATS === */
    .stat-section { margin-bottom: 32px; }
    .stat-section-head {
      font-size: 10px; letter-spacing: 2px; color: var(--text-2); font-weight: 700;
      margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-1);
    }
    .stats-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 18px; }
    .stat-box { background: var(--bg-2); padding: 14px 12px; }
    .stat-num { font-size: 28px; font-weight: 800; color: var(--accent); font-family: Impact, 'Helvetica Neue Condensed', sans-serif; line-height: 1; }
    .stat-lbl { font-size: 10px; letter-spacing: 1.5px; color: var(--text-2); margin-top: 6px; font-weight: 600; }
    .e1rm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .e1rm-card { background: var(--bg-2); padding: 12px; }
    .e1rm-name { font-size: 11px; letter-spacing: 1.5px; color: var(--text-2); font-weight: 600; }
    .e1rm-val {
      font-size: 22px; font-weight: 800; color: var(--accent);
      font-family: ui-monospace, monospace; letter-spacing: -0.5px;
      margin-top: 4px; line-height: 1;
    }
    .e1rm-trend { font-size: 10px; color: var(--text-2); margin-top: 4px; }
    .e1rm-trend.up { color: var(--success); }
    .chart-wrap { background: var(--bg-2); padding: 16px 12px 12px; }
    .chart-svg { width: 100%; height: 180px; }
    .axis-lbl { font-size: 9px; fill: var(--text-2); font-family: ui-monospace, monospace; }
    .bar-fill { fill: var(--accent); }
    .line-stroke { stroke: var(--accent); stroke-width: 2; fill: none; }
    .line-point { fill: var(--accent); }
    .grid-line { stroke: var(--border-1); stroke-dasharray: 2 4; }
    .compliance-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-1); align-items: center; }
    .compliance-week { font-size: 12px; color: var(--text-1); font-weight: 600; }
    .compliance-bar-wrap { flex: 1; height: 4px; background: var(--border-1); margin: 0 12px; }
    .compliance-bar-fill { height: 100%; background: var(--success); }
    .compliance-val { font-size: 12px; color: var(--text-2); font-family: ui-monospace, monospace; min-width: 50px; text-align: right; }
    .empty { text-align: center; color: var(--text-3); font-size: 12px; font-style: italic; padding: 40px 0; }
    .reset-btn {
      background: transparent; color: var(--text-2); border: 1px solid var(--border-1);
      padding: 12px 16px; font-size: 11px; letter-spacing: 1.5px; margin-top: 32px;
      width: 100%; font-weight: 600;
    }
  </style>
</head>

    // ============================================================
    // STORAGE
    // ============================================================
    const K_PROGRESS = 'pl-progress';
    const K_BW = 'pl-bw';
    const K_READINESS = 'pl-readiness';

    let state = {
      view: 'today',
      lastView: null,
      activeSession: null,
      progress: {},
      bw: {},
      readiness: {},
      openWeek: 1,
      sessionData: null,
    };

    let timer = { interval: null, secLeft: 0, exName: '', active: false };
    let nextAnim = 'fade';
    let lastToggle = null;

    function loadAll() {
      try { const r = localStorage.getItem(K_PROGRESS); if (r) state.progress = JSON.parse(r); } catch (e) {}
      try { const r = localStorage.getItem(K_BW); if (r) state.bw = JSON.parse(r); } catch (e) {}
      try { const r = localStorage.getItem(K_READINESS); if (r) state.readiness = JSON.parse(r); } catch (e) {}
    }
    function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} }
    function saveProgress() { save(K_PROGRESS, state.progress); }
    function saveBw() { save(K_BW, state.bw); }
    function saveReadiness() { save(K_READINESS, state.readiness); }

    // ============================================================
    // HELPERS
    // ============================================================
    function sessionKey(w, d) { return `s${w}-d${d}`; }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function formatTime(s) {
      const m = Math.floor(s / 60), r = s % 60;
      return `${m}:${r.toString().padStart(2, '0')}`;
    }
    function todayKey() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function dateInfo() {
      const d = new Date();
      return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
    }
    function daysBetween(dateStr1, dateStr2) {
      const a = new Date(dateStr1 + 'T00:00:00');
      const b = new Date(dateStr2 + 'T00:00:00');
      return Math.round((b - a) / 86400000);
    }
    function fmtDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });
    }
    function fmtDateShort(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
    }
    // Brzycki formula for e1RM, capped at 12 reps
    function e1rm(weight, reps) {
      if (!weight || !reps || reps < 1) return null;
      const r = Math.min(parseInt(reps), 12);
      if (r === 1) return weight;
      return weight * 36 / (37 - r);
    }

    function findNextSession() {
      const today = todayKey();
      // Today's session first
      for (const w of PROGRAM) {
        for (const d of w.days) {
          if (d.date === today) {
            const k = sessionKey(w.n, d.n);
            if (!state.progress[k]?.completed) return { week: w.n, day: d.n };
          }
        }
      }
      // Future or past incomplete sessions
      for (const w of PROGRAM) {
        for (const d of w.days) {
          const k = sessionKey(w.n, d.n);
          if (!state.progress[k]?.completed) return { week: w.n, day: d.n };
        }
      }
      return null;
    }

    function findTodaySessionType() {
      const today = todayKey();
      const next = findNextSession();
      if (!next) return { type: 'done', next: null };

      // Check exact date match
      for (const w of PROGRAM) {
        for (const d of w.days) {
          if (d.date === today) {
            const k = sessionKey(w.n, d.n);
            if (state.progress[k]?.completed) return { type: 'done-today', next };
            return { type: 'today', week: w.n, day: d.n };
          }
        }
      }
      return { type: 'rest', next };
    }

    function findNextTest() {
      const today = todayKey();
      const tests = [];
      for (const w of PROGRAM) {
        for (const d of w.days) {
          if (d.isTest && d.date >= today) {
            const k = sessionKey(w.n, d.n);
            if (!state.progress[k]?.completed) {
              tests.push({ ...d, week: w.n });
            }
          }
        }
      }
      tests.sort((a,b) => a.date.localeCompare(b.date));
      return tests[0] || null;
    }

    function daysSinceLastLift(liftKey) {
      const groups = {
        'squat': ['squat', 'tempo-squat'],
        'bench': ['bench', 'bench-pause', 'db-bench'],
        'dl': ['dl', 'rdl'],
        'ohp': ['ohp'],
      };
      const keys = groups[liftKey] || [liftKey];
      let mostRecent = null;
      for (const [k, sess] of Object.entries(state.progress)) {
        if (!sess.completed) continue;
        const has = sess.exercises.some(e => {
          const def = PROGRAM.flatMap(w => w.days).flatMap(dd => dd.ex).find(x => x.name === e.name);
          return def && keys.includes(def.key) && e.sets.some(s => s.done);
        });
        if (has && sess.date) {
          const d = new Date(sess.date);
          if (!mostRecent || d > mostRecent) mostRecent = d;
        }
      }
      if (!mostRecent) return null;
      const diff = Math.floor((new Date() - mostRecent) / 86400000);
      return diff;
    }

    function findLastCompletedSession() {
      const completed = Object.entries(state.progress)
        .filter(([_, s]) => s.completed)
        .map(([k, s]) => ({ k, ...s }))
        .sort((a, b) => new Date(b.date) - new Date(a.date));
      return completed[0] || null;
    }

    function getTodayBw() { return state.bw[todayKey()] ?? null; }
    function getRecentBw() {
      const keys = Object.keys(state.bw).sort().reverse();
      return keys.length > 0 ? state.bw[keys[0]] : null;
    }
    function getTodayReadiness() { return state.readiness[todayKey()] ?? null; }

    // ============================================================
    // RENDER: TODAY
    // ============================================================
    function renderToday() {
      const total = PROGRAM.reduce((a, w) => a + w.days.length, 0);
      const done = Object.values(state.progress).filter(p => p.completed).length;
      const pct = Math.round((done / total) * 100);
      const dateLine = dateInfo();
      const dateCapitalized = dateLine.charAt(0).toUpperCase() + dateLine.slice(1);

      // Countdown to next test
      const nextTest = findNextTest();
      let countdownBlock = '';
      if (nextTest) {
        const days = daysBetween(todayKey(), nextTest.date);
        const testLabel = nextTest.name.replace(/^TEST\s+/i, '').replace(/\s+\+\s*OHP.*$/i, '').toUpperCase();
        countdownBlock = `
          <div class="countdown">
            <div class="countdown-left">
              <div class="countdown-label">PROCHAIN TEST</div>
              <div class="countdown-target">${escapeHtml(testLabel)}</div>
              <div class="countdown-date">${escapeHtml(fmtDate(nextTest.date))}</div>
            </div>
            <div>
              <div class="countdown-num">J−${days}</div>
              <div class="countdown-num-sub">JOURS</div>
            </div>
          </div>
        `;
      }

      // Recovery status
      const liftKeys = [
        { key: 'squat', label: 'SQ' },
        { key: 'bench', label: 'BP' },
        { key: 'dl', label: 'DL' },
        { key: 'ohp', label: 'OHP' },
      ];
      const recovBlock = `
        <div class="recovery">
          <div class="recovery-head">
            <span class="section-label">STATUT RÉCUP</span>
          </div>
          <div class="recovery-grid">
            ${liftKeys.map(lk => {
              const days = daysSinceLastLift(lk.key);
              let cls = 'never', text = '—';
              if (days !== null) {
                if (days === 0) { cls = 'fresh'; text = 'auj'; }
                else if (days === 1) { cls = 'warning'; text = '1j'; }
                else if (days === 2) { cls = 'warning'; text = '2j'; }
                else { cls = 'ready'; text = days + 'j'; }
              }
              return `
                <div class="recovery-item">
                  <span class="recovery-lift">${lk.label}</span>
                  <span class="recovery-time ${cls}">${text}</span>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;

      // BW + Readiness
      const bw = getTodayBw() ?? getRecentBw();
      const todayBw = getTodayBw();
      const readiness = getTodayReadiness();
      const emojis = ['😴', '🙂', '💪', '🔥'];
      const quickBlock = `
        <div class="quick-row">
          <div class="quick-card">
            <div class="eyebrow">POIDS DE CORPS</div>
            <div class="bw-display ${bw === null ? 'empty' : ''}" data-action="edit-bw">
              ${bw !== null ? bw.toFixed(1).replace('.', ',') + '<span class="bw-unit">kg</span>' : 'noter'}
            </div>
          </div>
          <div class="quick-card">
            <div class="eyebrow">ÉTAT DU JOUR</div>
            <div class="readiness-row">
              ${emojis.map(e => `
                <button class="readiness-btn ${readiness === e ? 'selected' : ''}"
                  data-action="set-readiness" data-emoji="${e}">${e}</button>
              `).join('')}
            </div>
          </div>
        </div>
      `;

      // Today's session
      const ti = findTodaySessionType();
      let sessionBlock = '';
      if (ti.type === 'done') {
        sessionBlock = `
          <div class="session-section">
            <div class="section-label session-section-label">PROGRAMME TERMINÉ</div>
            <div class="session-day-name">${done}/${total} séances</div>
            <div class="session-week-info">Profite des vacances !</div>
          </div>
        `;
      } else {
        let sectionLabel, targetWeek, targetDay, buttonLabel;
        if (ti.type === 'today') {
          sectionLabel = 'SÉANCE DU JOUR';
          buttonLabel = 'DÉMARRER LA SÉANCE';
          targetWeek = ti.week; targetDay = ti.day;
        } else if (ti.type === 'done-today') {
          sectionLabel = 'TERMINÉE AUJOURD\'HUI · PROCHAINE :';
          buttonLabel = 'VOIR LA SÉANCE';
          targetWeek = ti.next.week; targetDay = ti.next.day;
        } else {
          sectionLabel = 'JOUR DE REPOS · PROCHAINE SÉANCE';
          buttonLabel = 'VOIR LA SÉANCE';
          targetWeek = ti.next.week; targetDay = ti.next.day;
        }
        const w = PROGRAM.find(x => x.n === targetWeek);
        const d = w.days.find(x => x.n === targetDay);

        sessionBlock = `
          <div class="session-section">
            <div class="section-label session-section-label">${sectionLabel}</div>
            <div class="session-day-name">${escapeHtml(d.label)} · ${escapeHtml(d.name)}</div>
            <div class="session-week-info">S${w.n} · ${escapeHtml(w.block)} · ${fmtDateShort(d.date)}</div>
            <div class="ex-list">
              ${d.ex.map(e => {
                let stats;
                if (e.isTest) {
                  stats = `${e.overrides ? e.overrides.length : e.sets} étapes`;
                } else {
                  stats = `${e.sets}×${e.reps}${e.weight ? ` · ${e.weight}kg` : ''}${e.rpe ? ` · RPE ${e.rpe}` : ''}`;
                }
                return `
                  <div class="ex-list-row">
                    <div class="ex-list-name">
                      <span class="ex-mark ${e.main ? 'main' : ''}">${e.main ? '●' : '○'}</span>
                      ${escapeHtml(e.name)}
                    </div>
                    <div class="ex-list-stats">${stats}</div>
                  </div>
                `;
              }).join('')}
            </div>
            <button class="cta" data-action="start-session" data-week="${w.n}" data-day="${d.n}">${buttonLabel}</button>
          </div>
        `;
      }

      // Last session
      const last = findLastCompletedSession();
      let lastBlock = '';
      if (last) {
        const lastDef = PROGRAM.flatMap(w => w.days).find(dd => dd.date === last.date);
        const mainEx = last.exercises.find(e => {
          const def = PROGRAM.flatMap(w => w.days).flatMap(dd => dd.ex).find(x => x.name === e.name);
          return def?.main;
        });
        let topSetStr = '';
        if (mainEx) {
          const topSet = mainEx.sets.filter(s => s.done && s.weight).reduce((m, s) => (s.weight > (m?.weight || 0) ? s : m), null);
          if (topSet) {
            topSetStr = `Top: ${mainEx.name.split('—')[0].trim()} ${topSet.weight}×${topSet.reps}${topSet.rpe ? ' RPE ' + topSet.rpe : ''}`;
          }
        }
        lastBlock = `
          <div class="last-session">
            <div class="eyebrow">DERNIÈRE SÉANCE</div>
            <div class="last-session-info">${lastDef ? escapeHtml(lastDef.label + ' · ' + lastDef.name) : 'Séance complétée'}</div>
            ${topSetStr ? `<div class="last-session-detail">${escapeHtml(topSetStr)}</div>` : ''}
          </div>
        `;
      } else {
        lastBlock = `
          <div class="last-session">
            <div class="eyebrow">DERNIÈRE SÉANCE</div>
            <div class="last-session-empty">Pas encore de séance complétée.</div>
          </div>
        `;
      }

      return `
        <div class="pad">
          <div class="eyebrow">${escapeHtml(dateCapitalized)}</div>
          <h1>Aujourd'hui</h1>
          ${countdownBlock}
          ${recovBlock}
          ${quickBlock}
          ${sessionBlock}
          ${lastBlock}
          <div class="progress-block">
            <div class="progress-lbl"><span>PROGRESSION CYCLE</span><span>${done}/${total}</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          </div>
        </div>
      `;
    }

    // ============================================================
    // RENDER: PROGRAMME
    // ============================================================
    function renderProgram() {
      const w = PROGRAM.find(x => x.n === state.openWeek);
      return `
        <div class="pad">
          <div class="eyebrow">PEAK BLOCK</div>
          <h1>Programme</h1>
          <div class="subtitle">4 semaines · 22 juin → 15 juillet</div>

          </div>

            const done = state.progress[sessionKey(w.n, d.n)]?.completed;

                  <div class="day-date">${escapeHtml(exPreview)}${more}</div>
                </div>
                <div class="day-arrow ${done ? 'done' : ''}">${done ? '✓' : '›'}</div>
              </button>
            `;
          }).join('')}
        </div>
      `;
    }

    // ============================================================
    // RENDER: SESSION
    // ============================================================
    function renderSession() {
      const { week, day } = state.activeSession;
      const w = PROGRAM.find(x => x.n === week);
      const d = w.days.find(x => x.n === day);
      const sd = state.sessionData;

      const totalSets = sd.exercises.reduce((a, e) => a + e.sets.length, 0);
      const doneSets = sd.exercises.reduce((a, e) => a + e.sets.filter(s => s.done).length, 0);
      const pct = totalSets ? (doneSets / totalSets) * 100 : 0;

      return `
        <div class="pad" style="padding-bottom:120px;">
          <button class="back-btn" data-action="back-to-today">← retour</button>
          <div class="eyebrow">SEMAINE ${week} · ${d.label.toUpperCase()} · ${fmtDateShort(d.date)}</div>
          <h1>${escapeHtml(d.name)}</h1>
          <div class="session-progress">
            <span>${doneSets}/${totalSets} séries</span>
            <div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
          </div>
          ${sd.exercises.map((ex, exIdx) => {
            const def = d.ex[exIdx];
            const isTest = def.isTest;
            return `
              <div class="ex-card">
                <div class="ex-name">${escapeHtml(ex.name)}</div>
                ${!isTest ? `<div class="ex-target">Cible : ${def.sets}×${def.reps}${def.weight ? ` @ ${def.weight} kg` : ''}${def.rpe ? ` (RPE ${def.rpe})` : ''}</div>` : ''}
                ${def.note ? `<div class="ex-note">${escapeHtml(def.note)}</div>` : ''}
                ${isTest ? `<div class="ex-test-banner">TEST · échauffement progressif puis essais</div>` : ''}

                <div class="sets-grid ${isTest ? 'with-label' : ''}">
                  <div class="set-head">#</div>
                  ${isTest ? '<div class="set-head">étape</div>' : '<div class="set-head">kg</div>'}
                  <div class="set-head">${isTest ? 'kg' : 'reps'}</div>
                  <div class="set-head">${isTest ? 'reps' : 'RPE'}</div>
                  <div class="set-head">✓</div>
                  ${ex.sets.map((set, setIdx) => {
                    const labelText = set.label ? set.label : '';
                    const isAttempt = labelText.toLowerCase().includes('essai') || labelText.toLowerCase().includes('stretch') || labelText.toLowerCase().includes('pr') || labelText.toLowerCase().includes('single');
                    return `
                      <div class="set-num">${setIdx + 1}</div>
                      ${isTest ? `<div class="set-label ${isAttempt ? 'attempt' : ''}">${escapeHtml(labelText)}</div>` : ''}
                      <input class="set-input" type="number" step="2.5" inputmode="decimal"
                        data-ex="${exIdx}" data-set="${setIdx}" data-field="weight"
                        value="${set.weight ?? ''}" placeholder="—">
                      <input class="set-input" type="${isTest ? 'number' : 'text'}" inputmode="numeric"
                        data-ex="${exIdx}" data-set="${setIdx}" data-field="reps"
                        value="${set.reps ?? ''}" placeholder="—">
                      ${!isTest ? `<input class="set-input" type="number" step="0.5" min="1" max="10" inputmode="decimal"
                        data-ex="${exIdx}" data-set="${setIdx}" data-field="rpe"
                        value="${set.rpe ?? ''}" placeholder="—">` : ''}
                      <button class="set-check ${set.done ? 'done' : ''}"
                        data-action="toggle-set" data-ex="${exIdx}" data-set="${setIdx}"
                        data-rest="${def.rest}" data-exname="${escapeHtml(ex.name)}">
                        ${set.done ? '✓' : ''}
                      </button>
                    `;
                  }).join('')}
                </div>
              </div>
            `;
          }).join('')}

          <button class="cta" data-action="end-session">TERMINER LA SÉANCE</button>
        </div>
        ${timer.active ? `
          <div class="timer">
            <div class="timer-lbl">REPOS · ${escapeHtml(timer.exName)}</div>
            <div class="timer-num" id="timer-display">${formatTime(timer.secLeft)}</div>
            <button class="timer-skip" data-action="skip-timer">passer</button>
          </div>
        ` : ''}
      `;
    }

    // ============================================================
    // RENDER: STATS
    // ============================================================
    function renderStats() {
      const completed = Object.entries(state.progress)
        .filter(([_, s]) => s.completed)
        .map(([k, s]) => ({ k, ...s }))
        .sort((a, b) => new Date(a.date) - new Date(b.date));
      const total = PROGRAM.reduce((a, w) => a + w.days.length, 0);
      const doneCount = completed.length;

      if (doneCount === 0) {
        return `
          <div class="pad">
            <div class="eyebrow">CYCLE EN COURS</div>
            <h1>Statistiques</h1>
            <div class="empty">Termine ta première séance du cycle pour voir tes stats.</div>
          </div>
        `;
      }

      // Total tonnage
      let totalTonnage = 0;
      completed.forEach(s => {
        s.exercises.forEach(e => {
          e.sets.forEach(set => {
            if (set.done && set.weight && set.reps) {
              const r = parseInt(set.reps) || 0;
              totalTonnage += set.weight * r;
            }
          });
        });
      });

      // Summary
      const summary = `
        <div class="stats-summary">
          <div class="stat-box">
            <div class="stat-num">${doneCount}</div>
            <div class="stat-lbl">séances · /${total}</div>
          </div>
          <div class="stat-box">
            <div class="stat-num">${Math.round(doneCount/total*100)}%</div>
            <div class="stat-lbl">complétion</div>
          </div>
          <div class="stat-box">
            <div class="stat-num">${(totalTonnage/1000).toFixed(1)}t</div>
            <div class="stat-lbl">tonnage cycle</div>
          </div>
        </div>
      `;

      // e1RM evolution per main lift
      const mainLiftKeys = ['squat', 'bench', 'dl', 'ohp'];
      const liftLabels = { squat: 'SQUAT', bench: 'BENCH', dl: 'DEADLIFT', ohp: 'OHP' };

      // Find best e1RM per session for each lift
      const e1rmHistory = {};
      mainLiftKeys.forEach(lk => e1rmHistory[lk] = []);
      completed.forEach(s => {
        mainLiftKeys.forEach(lk => {
          let bestE1RM = 0, bestSet = null;
          s.exercises.forEach(e => {
            const def = PROGRAM.flatMap(w => w.days).flatMap(d => d.ex).find(x => x.name === e.name);
            if (!def || def.key !== lk) return;
            e.sets.forEach(set => {
              if (set.done && set.weight && set.reps) {
                const r = parseInt(set.reps) || 0;
                const v = e1rm(set.weight, r);
                if (v && v > bestE1RM) { bestE1RM = v; bestSet = set; }
              }
            });
          });
          if (bestE1RM > 0) {
            e1rmHistory[lk].push({ date: s.date, value: bestE1RM, set: bestSet });
          }
        });
      });

      const e1rmCards = mainLiftKeys.map(lk => {
        const data = e1rmHistory[lk];
        if (data.length === 0) {
          return `
            <div class="e1rm-card">
              <div class="e1rm-name">${liftLabels[lk]}</div>
              <div class="e1rm-val">—</div>
              <div class="e1rm-trend">aucune donnée</div>
            </div>
          `;
        }
        const current = data[data.length - 1].value;
        const first = data[0].value;
        const delta = current - first;
        const trendClass = delta > 0 ? 'up' : '';
        const trendStr = data.length > 1 ? (delta > 0 ? `+${delta.toFixed(1)} kg` : `${delta.toFixed(1)} kg`) : 'départ';
        return `
          <div class="e1rm-card">
            <div class="e1rm-name">${liftLabels[lk]}</div>
            <div class="e1rm-val">${current.toFixed(1)} kg</div>
            <div class="e1rm-trend ${trendClass}">${trendStr}</div>
          </div>
        `;
      }).join('');

      // e1RM line chart (single chart with all lifts)
      const allDates = [...new Set(completed.map(s => s.date))].sort();
      const colors = { squat: '#D4382F', bench: '#E5C547', dl: '#6FA85B', ohp: '#5BAFFF' };
      let multiLineChart = '';
      if (allDates.length > 1) {
        const W = 320, H = 200;
        const pad = { l: 35, r: 8, t: 14, b: 30 };
        const innerW = W - pad.l - pad.r;
        const innerH = H - pad.t - pad.b;
        const allVals = mainLiftKeys.flatMap(lk => e1rmHistory[lk].map(d => d.value));
        if (allVals.length > 0) {
          const maxV = Math.max(...allVals);
          const minV = Math.min(...allVals);
          const range = (maxV - minV) || 1;
          const padR = range * 0.1;
          const yMax = maxV + padR;
          const yMin = Math.max(0, minV - padR);
          const yRange = yMax - yMin || 1;

          const yToPx = v => pad.t + innerH - ((v - yMin) / yRange) * innerH;
          const xToPx = i => pad.l + (allDates.length === 1 ? innerW/2 : (i / (allDates.length - 1)) * innerW);

          const lines = mainLiftKeys.map(lk => {
            const points = e1rmHistory[lk].map(d => {
              const idx = allDates.indexOf(d.date);
              return { x: xToPx(idx), y: yToPx(d.value) };
            });
            if (points.length === 0) return '';
            const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
            return `
              <path d="${path}" stroke="${colors[lk]}" stroke-width="2" fill="none" />
              ${points.map(p => `<circle cx="${p.x}" cy="${p.y}" r="3" fill="${colors[lk]}"/>`).join('')}
            `;
          }).join('');

          // y-axis ticks
          const ticks = [0, 0.5, 1].map(t => {
            const v = yMin + yRange * t;
            const y = yToPx(v);
            return `
              <line class="grid-line" x1="${pad.l}" y1="${y}" x2="${W - pad.r}" y2="${y}"/>
              <text class="axis-lbl" x="${pad.l - 4}" y="${y + 3}" text-anchor="end">${Math.round(v)}</text>
            `;
          }).join('');

          // Legend
          const legend = mainLiftKeys.map((lk, i) => `
            <g transform="translate(${pad.l + i * 70}, ${H - 8})">
              <rect x="0" y="-7" width="10" height="2" fill="${colors[lk]}"/>
              <text class="axis-lbl" x="14" y="-2">${liftLabels[lk].substring(0,4)}</text>
            </g>
          `).join('');

          multiLineChart = `
            <div class="chart-wrap">
              <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
                ${ticks}
                ${lines}
                ${legend}
              </svg>
            </div>
          `;
        }
      }

      // Weekly tonnage chart (by week of program)
      const weeklyTonnage = {};
      completed.forEach(s => {
        const def = PROGRAM.flatMap(w => w.days.map(d => ({...d, week: w.n}))).find(dd => dd.date === s.date);
        if (!def) return;
        const wk = def.week;
        if (!weeklyTonnage[wk]) weeklyTonnage[wk] = 0;
        s.exercises.forEach(e => {
          e.sets.forEach(set => {
            if (set.done && set.weight && set.reps) {
              const r = parseInt(set.reps) || 0;
              weeklyTonnage[wk] += set.weight * r;
            }
          });
        });
      });

      const tonnageData = Object.entries(weeklyTonnage).map(([w, v]) => ({ label: 'S' + w, value: Math.round(v/1000*10)/10 }));
      let tonnageChart = '';
      if (tonnageData.length > 0) {
        const W = 320, H = 160;
        const pad = { l: 28, r: 8, t: 10, b: 24 };
        const maxV = Math.max(...tonnageData.map(d => d.value), 0.1);
        const innerH = H - pad.t - pad.b;
        const innerW = W - pad.l - pad.r;
        const barW = innerW / tonnageData.length * 0.7;
        const barGap = innerW / tonnageData.length * 0.3;
        tonnageChart = `
          <div class="chart-wrap">
            <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
              ${[0, 0.5, 1].map(t => {
                const y = pad.t + innerH * (1 - t);
                const v = (maxV * t).toFixed(1);
                return `
                  <line class="grid-line" x1="${pad.l}" y1="${y}" x2="${W - pad.r}" y2="${y}"/>
                  <text class="axis-lbl" x="${pad.l - 4}" y="${y + 3}" text-anchor="end">${v}</text>
                `;
              }).join('')}
              ${tonnageData.map((d, i) => {
                const x = pad.l + i * (barW + barGap) + barGap/2;
                const h = maxV > 0 ? (d.value / maxV) * innerH : 0;
                const y = pad.t + innerH - h;
                return `
                  <rect class="bar-fill" x="${x}" y="${y}" width="${barW}" height="${h}"/>
                  <text class="axis-lbl" x="${x + barW/2}" y="${H - pad.b + 12}" text-anchor="middle">${d.label}</text>
                `;
              }).join('')}
            </svg>
          </div>
        `;
      }

      // RPE distribution
      const rpeCounts = {};
      completed.forEach(s => {
        s.exercises.forEach(e => {
          e.sets.forEach(set => {
            if (set.done && set.rpe) {
              const r = Math.round(set.rpe * 2) / 2;
              rpeCounts[r] = (rpeCounts[r] || 0) + 1;
            }
          });
        });
      });
      const rpeData = Object.entries(rpeCounts).map(([r, c]) => ({ label: r, value: c })).sort((a,b) => parseFloat(a.label) - parseFloat(b.label));
      let rpeChart = '';
      if (rpeData.length > 0) {
        const W = 320, H = 140;
        const pad = { l: 28, r: 8, t: 10, b: 24 };
        const maxV = Math.max(...rpeData.map(d => d.value));
        const innerH = H - pad.t - pad.b;
        const innerW = W - pad.l - pad.r;
        const barW = innerW / rpeData.length * 0.7;
        const barGap = innerW / rpeData.length * 0.3;
        rpeChart = `
          <div class="chart-wrap">
            <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
              ${[0, 1].map(t => {
                const y = pad.t + innerH * (1 - t);
                const v = Math.round(maxV * t);
                return `
                  <line class="grid-line" x1="${pad.l}" y1="${y}" x2="${W - pad.r}" y2="${y}"/>
                  <text class="axis-lbl" x="${pad.l - 4}" y="${y + 3}" text-anchor="end">${v}</text>
                `;
              }).join('')}
              ${rpeData.map((d, i) => {
                const x = pad.l + i * (barW + barGap) + barGap/2;
                const h = (d.value / maxV) * innerH;
                const y = pad.t + innerH - h;
                return `
                  <rect class="bar-fill" x="${x}" y="${y}" width="${barW}" height="${h}"/>
                  <text class="axis-lbl" x="${x + barW/2}" y="${H - pad.b + 12}" text-anchor="middle">${d.label}</text>
                `;
              }).join('')}
            </svg>
          </div>
        `;
      }

      // Compliance per week
      const compliance = PROGRAM.map(w => {
        const total = w.days.length;
        const done = w.days.filter(d => state.progress[sessionKey(w.n, d.n)]?.completed).length;
        return { week: w.n, done, total, pct: total ? done/total*100 : 0 };
      });
      const complianceRows = compliance.map(c => `
        <div class="compliance-row">
          <span class="compliance-week">S${c.week}</span>
          <div class="compliance-bar-wrap"><div class="compliance-bar-fill" style="width:${c.pct}%"></div></div>
          <span class="compliance-val">${c.done}/${c.total}</span>
        </div>
      `).join('');

      // BW chart
      const bwData = Object.entries(state.bw).sort().map(([d, v]) => ({ date: d, value: v }));
      let bwBlock = '';
      if (bwData.length >= 2) {
        const W = 320, H = 140;
        const pad = { l: 32, r: 8, t: 10, b: 22 };
        const innerH = H - pad.t - pad.b;
        const innerW = W - pad.l - pad.r;
        const vals = bwData.map(d => d.value);
        const maxV = Math.max(...vals);
        const minV = Math.min(...vals);
        const range = (maxV - minV) || 1;
        const padR = range * 0.2;
        const yMax = maxV + padR;
        const yMin = minV - padR;
        const yRange = yMax - yMin || 1;
        const points = bwData.map((d, i) => {
          const x = pad.l + (bwData.length === 1 ? innerW/2 : (i / (bwData.length - 1)) * innerW);
          const y = pad.t + innerH - ((d.value - yMin) / yRange) * innerH;
          return { x, y, value: d.value };
        });
        const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
        bwBlock = `
          <div class="chart-wrap">
            <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
              ${[0, 0.5, 1].map(t => {
                const v = yMin + yRange * t;
                const y = pad.t + innerH * (1 - t);
                return `
                  <line class="grid-line" x1="${pad.l}" y1="${y}" x2="${W - pad.r}" y2="${y}"/>
                  <text class="axis-lbl" x="${pad.l - 4}" y="${y + 3}" text-anchor="end">${v.toFixed(1)}</text>
                `;
              }).join('')}
              <path d="${path}" stroke="${colors.bench || '#E5C547'}" stroke-width="2" fill="none"/>
              ${points.map(p => `<circle cx="${p.x}" cy="${p.y}" r="3" fill="#E5C547"/>`).join('')}
            </svg>
          </div>
        `;
      }

      // Readiness avg per week
      const readinessMap = { '😴': 1, '🙂': 2, '💪': 3, '🔥': 4 };
      const readinessByWeek = {};
      Object.entries(state.readiness).forEach(([dateStr, emoji]) => {
        // Find which week this date falls in
        const w = PROGRAM.find(wk => wk.days.some(d => {
          const ws = wk.days[0].date;
          const we = wk.days[wk.days.length - 1].date;
          return dateStr >= ws && dateStr <= we;
        }));
        if (w) {
          if (!readinessByWeek[w.n]) readinessByWeek[w.n] = [];
          readinessByWeek[w.n].push(readinessMap[emoji]);
        }
      });
      let readinessBlock = '';
      const readinessEntries = Object.entries(readinessByWeek);
      if (readinessEntries.length > 0) {
        readinessBlock = `
          <div class="chart-wrap">
            ${readinessEntries.map(([w, vals]) => {
              const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
              const emoji = avg < 1.5 ? '😴' : avg < 2.5 ? '🙂' : avg < 3.5 ? '💪' : '🔥';
              return `
                <div class="compliance-row">
                  <span class="compliance-week">S${w}</span>
                  <div class="compliance-bar-wrap"><div class="compliance-bar-fill" style="width:${(avg/4)*100}%; background: var(--accent);"></div></div>
                  <span class="compliance-val">${emoji} ${avg.toFixed(1)}</span>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }

      return `
        <div class="pad">
          <div class="eyebrow">CYCLE EN COURS</div>
          <h1>Statistiques</h1>
          ${summary}

          <div class="stat-section">
            <div class="stat-section-head">e1RM ESTIMÉ — DERNIÈRE VALEUR</div>
            <div class="e1rm-grid">${e1rmCards}</div>
            ${multiLineChart ? `<div style="margin-top:12px;">${multiLineChart}</div>` : ''}
          </div>

          <div class="stat-section">
            <div class="stat-section-head">TONNAGE PAR SEMAINE (tonnes)</div>
            ${tonnageChart || '<div class="empty">Pas encore de données</div>'}
          </div>

          <div class="stat-section">
            <div class="stat-section-head">DISTRIBUTION DES RPE</div>
            ${rpeChart || '<div class="empty">Note tes RPE pour voir la distribution</div>'}
          </div>

          <div class="stat-section">
            <div class="stat-section-head">RÉGULARITÉ PAR SEMAINE</div>
            ${complianceRows}
          </div>

          ${bwBlock ? `
          <div class="stat-section">
            <div class="stat-section-head">POIDS DE CORPS</div>
            ${bwBlock}
          </div>
          ` : ''}

          ${readinessBlock ? `
          <div class="stat-section">
            <div class="stat-section-head">ÉTAT MOYEN PAR SEMAINE</div>
            ${readinessBlock}
          </div>
          ` : ''}

          <button class="reset-btn" data-action="reset-progress">RÉINITIALISER LA PROGRESSION</button>
        </div>
      `;
    }

    // ============================================================
    // NAV + ROOT RENDER
    // ============================================================
    function renderNav() {
      if (state.view === 'session') return '';
      return `
        <nav class="nav">
          <button class="tab-btn ${state.view === 'today' ? 'active' : ''}" data-action="nav" data-view="today">
            <div class="tab-icon">◉</div>
            <div class="tab-label">Aujourd'hui</div>
          </button>
          <button class="tab-btn ${state.view === 'program' ? 'active' : ''}" data-action="nav" data-view="program">
            <div class="tab-icon">≡</div>
            <div class="tab-label">Programme</div>
          </button>
          <button class="tab-btn ${state.view === 'stats' ? 'active' : ''}" data-action="nav" data-view="stats">
            <div class="tab-icon">▲</div>
            <div class="tab-label">Stats</div>
          </button>
        </nav>
      `;
    }

    function render() {
      const app = document.getElementById('app');
      let content = '';
      if (state.view === 'today') content = renderToday();
      else if (state.view === 'program') content = renderProgram();
      else if (state.view === 'session') content = renderSession();
      else if (state.view === 'stats') content = renderStats();

      const animClass = `anim-${nextAnim}`;
      app.innerHTML = `<div class="${animClass}" id="app-content">${content}</div>` + renderNav();
      nextAnim = 'fade';

      // Pulse the last toggled set
      if (lastToggle) {
        setTimeout(() => {
          const btn = document.querySelector(`[data-action="toggle-set"][data-ex="${lastToggle.ex}"][data-set="${lastToggle.set}"]`);
          if (btn) {
            btn.classList.add('just-checked');
            setTimeout(() => btn.classList.remove('just-checked'), 320);
          }
        }, 0);
        lastToggle = null;
      }
    }

    // ============================================================
    // ACTIONS
    // ============================================================
    function setView(newView) {
      const oldView = state.view;
      if (oldView !== 'session' && newView === 'session') nextAnim = 'slide-up';
      else if (oldView === 'session' && newView !== 'session') nextAnim = 'slide-down';
      else nextAnim = 'fade';
      state.lastView = oldView;
      state.view = newView;
      render();
    }

    function startSession(week, day) {
      const w = PROGRAM.find(x => x.n === week);
      const d = w.days.find(x => x.n === day);
      const k = sessionKey(week, day);
      if (state.progress[k]) {
        state.sessionData = state.progress[k];
      } else {
        state.sessionData = {
          completed: false,
          date: d.date,
          exercises: d.ex.map(e => ({
            key: e.key,
            name: e.name,
            sets: e.overrides
              ? e.overrides.map(o => ({ done: false, weight: o.weight, reps: o.reps, rpe: null, label: o.label }))
              : Array(e.sets).fill(null).map(() => ({
                  done: false,
                  weight: e.weight ?? null,
                  reps: e.reps,
                  rpe: null
                }))
          }))
        };
      }
      state.activeSession = { week, day };
      setView('session');
    }

    function endSession() {
      const k = sessionKey(state.activeSession.week, state.activeSession.day);
      state.sessionData.completed = true;
      state.sessionData.endTime = new Date().toISOString();
      state.progress[k] = state.sessionData;
      saveProgress();
      state.activeSession = null;
      state.sessionData = null;
      stopTimer();
      setView('today');
    }

    function backToToday() {
      if (state.sessionData && state.activeSession) {
        const k = sessionKey(state.activeSession.week, state.activeSession.day);
        const hasProgress = state.sessionData.exercises.some(e => e.sets.some(s => s.done));
        if (hasProgress) {
          state.progress[k] = state.sessionData;
          saveProgress();
        }
      }
      state.activeSession = null;
      state.sessionData = null;
      stopTimer();
      setView('today');
    }

    function toggleSet(exIdx, setIdx, restSec, exName) {
      const set = state.sessionData.exercises[exIdx].sets[setIdx];
      set.done = !set.done;
      const k = sessionKey(state.activeSession.week, state.activeSession.day);
      state.progress[k] = state.sessionData;
      saveProgress();
      if (set.done) {
        lastToggle = { ex: exIdx, set: setIdx };
        if (navigator.vibrate) navigator.vibrate(15);
        if (restSec > 0) startTimer(restSec, exName);
      }
      render();
    }

    function updateSet(exIdx, setIdx, field, value) {
      const set = state.sessionData.exercises[exIdx].sets[setIdx];
      if (field === 'weight' || field === 'rpe') {
        set[field] = value ? parseFloat(value) : null;
      } else {
        set[field] = value;
      }
      const k = sessionKey(state.activeSession.week, state.activeSession.day);
      state.progress[k] = state.sessionData;
      saveProgress();
    }

    function startTimer(sec, exName) {
      stopTimer();
      timer.secLeft = sec;
      timer.exName = exName;
      timer.active = true;
      timer.interval = setInterval(() => {
        timer.secLeft--;
        if (timer.secLeft <= 0) {
          stopTimer();
          if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
          render();
        } else {
          const el = document.getElementById('timer-display');
          if (el) el.textContent = formatTime(timer.secLeft);
        }
      }, 1000);
    }

    function stopTimer() {
      if (timer.interval) clearInterval(timer.interval);
      timer.interval = null;
      timer.active = false;
      timer.secLeft = 0;
    }

    function resetProgress() {
      if (confirm('Effacer toute la progression du cycle (séances, poids de corps, état) ?')) {
        state.progress = {};
        state.bw = {};
        state.readiness = {};
        saveProgress(); saveBw(); saveReadiness();
        setView('today');
      }
    }

    function editBw() {
      const current = getTodayBw();
      const v = prompt('Poids de corps aujourd\'hui (kg) :', current !== null ? current : '');
      if (v === null || v === '') return;
      const num = parseFloat(v.replace(',', '.'));
      if (!isNaN(num) && num > 0 && num < 300) {
        state.bw[todayKey()] = num;
        saveBw();
        render();
      }
    }

    function setReadiness(emoji) {
      const tk = todayKey();
      if (state.readiness[tk] === emoji) {
        delete state.readiness[tk];
      } else {
        state.readiness[tk] = emoji;
      }
      saveReadiness();
      if (navigator.vibrate) navigator.vibrate(10);
      render();
    }

    // ============================================================
    // EVENT DELEGATION
    // ============================================================
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const a = btn.dataset.action;

      if (a === 'nav') setView(btn.dataset.view);
      else if (a === 'start-session') startSession(+btn.dataset.week, +btn.dataset.day);
      else if (a === 'open-week') { state.openWeek = +btn.dataset.week; render(); }
      else if (a === 'back-to-today') backToToday();
      else if (a === 'toggle-set') toggleSet(+btn.dataset.ex, +btn.dataset.set, +btn.dataset.rest, btn.dataset.exname);
      else if (a === 'end-session') endSession();
      else if (a === 'skip-timer') { stopTimer(); render(); }
      else if (a === 'reset-progress') resetProgress();
      else if (a === 'edit-bw') editBw();
      else if (a === 'set-readiness') setReadiness(btn.dataset.emoji);
    });

    document.addEventListener('input', (e) => {
      const inp = e.target;
      if (inp.dataset.field) {
        updateSet(+inp.dataset.ex, +inp.dataset.set, inp.dataset.field, inp.value);
      }
    });

    // ============================================================
    // INIT
    // ============================================================
    loadAll();
    render();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
